version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./skills:/app/skills
      - ./config.yaml:/app/config.yaml
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api